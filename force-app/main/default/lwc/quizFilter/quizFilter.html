<template>
	<lightning-card>
		<div class="slds-var-m-horizontal_medium">
			<lightning-layout
				vertical-align="end"
				class="slds-var-m-bottom_small"
			>
				<lightning-layout-item flexibility="grow">
					<lightning-slider
						label="Fail#"
						step="1"
						min="0"
						max="10"
						name="numberOfFail"
						value={numberOfFail}
						onchange={handleFilterChange}
					></lightning-slider>
				</lightning-layout-item>
				<lightning-layout-item>
					<lightning-input
						type="toggle"
						name="numberOfFailToggle"
						checked={numberOfFailToggle}
						onchange={handleFilterChange}
						message-toggle-active=""
						message-toggle-inactive=""
					></lightning-input>
				</lightning-layout-item>
			</lightning-layout>
			<lightning-layout
				vertical-align="end"
				class="slds-var-m-bottom_small"
			>
				<lightning-layout-item flexibility="grow">
					<lightning-slider
						label="Success#"
						step="1"
						min="0"
						max="10"
						name="numberOfSuccess"
						value={numberOfSuccess}
						onchange={handleFilterChange}
					></lightning-slider>
				</lightning-layout-item>
				<lightning-layout-item>
					<lightning-input
						type="toggle"
						name="numberOfSuccessToggle"
						checked={numberOfSuccessToggle}
						onchange={handleFilterChange}
						message-toggle-active=""
						message-toggle-inactive=""
					></lightning-input>
				</lightning-layout-item>
			</lightning-layout>
			<lightning-layout
				vertical-align="end"
				class="slds-var-m-bottom_small"
			>
				<lightning-layout-item flexibility="grow">
					<lightning-slider
						label="Greater than blank days#"
						step="1"
						min="0"
						max="30"
						name="numberOfDays"
						value={numberOfDays}
						onchange={handleFilterChange}
					></lightning-slider>
				</lightning-layout-item>
				<lightning-layout-item>
					<lightning-input
						type="toggle"
						name="numberOfDaysToggle"
						checked={numberOfDaysToggle}
						onchange={handleFilterChange}
						message-toggle-active=""
						message-toggle-inactive=""
					></lightning-input>
				</lightning-layout-item>
			</lightning-layout>
			<lightning-layout
				horizontal-align="space"
				vertical-align="center"
				class="slds-var-m-bottom_small"
			>
				<lightning-layout-item
					flexibility="auto"
					class="slds-m-top_small"
				>
					<lightning-input
						class="slds-var-m-around_small"
						label="Last failed"
						type="toggle"
						name="isLastFailedToggle"
						checked={isLastFailedToggle}
						onchange={handleFilterChange}
						message-toggle-active=""
						message-toggle-inactive=""
					></lightning-input>
				</lightning-layout-item>
			</lightning-layout>
		</div>
	</lightning-card>
</template>
